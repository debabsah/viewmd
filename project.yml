name: viewmd
options:
  bundleIdPrefix: com.debabsah
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
targets:
  viewmd:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: web/dist
        buildPhase: resources
        type: folder
      - path: bin
        buildPhase: resources
        type: folder
      - path: Resources/AppIcon.icns
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: viewmd
        CFBundleName: viewmd
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "0.3.0"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        CFBundleIconFile: AppIcon
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - net.daringfireball.markdown
          - CFBundleTypeName: Folder
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
            LSItemContentTypes:
              - public.folder
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [md, markdown, mdown, mkd]
    dependencies:
      - target: viewmdQuickLook
        embed: true
  viewmdQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debabsah.viewmd.quicklook
        CODE_SIGN_ENTITLEMENTS: QuickLook/viewmdQuickLook.entitlements
    info:
      path: Generated/QuickLook-Info.plist
      properties:
        CFBundleDisplayName: viewmd Quick Look
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            QLSupportsSearchableItems: false
  viewmdTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: viewmd
schemes:
  viewmd:
    build:
      targets:
        viewmd: all
    test:
      targets:
        - viewmdTests
